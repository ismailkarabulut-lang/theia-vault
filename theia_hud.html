<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Theia Vault — Core</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#05030a; overflow:hidden; }

/* === CANVAS LAYERS === */
canvas { position:absolute; top:0; left:0; }
#bg { z-index:0; }
#c { z-index:1; }
#fx { z-index:2; }

/* === OVERLAY === */
#overlay { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; }

/* === 3D MODULE CARDS === */
.mod {
  position:absolute;
  pointer-events:all;
  cursor:pointer;
  width:210px;
  padding:18px 20px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.08);
  background:linear-gradient(145deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
  backdrop-filter:blur(20px) saturate(1.4);
  -webkit-backdrop-filter:blur(20px) saturate(1.4);
  transition:all 0.45s cubic-bezier(0.23, 1, 0.32, 1);
  transform:translate(-50%,-50%) perspective(800px) rotateX(0deg) rotateY(0deg);
  transform-style:preserve-3d;
  box-shadow:
    0 4px 24px rgba(0,0,0,0.4),
    inset 0 1px 0 rgba(255,255,255,0.06),
    inset 0 -1px 0 rgba(0,0,0,0.3);
  overflow:hidden;
}
.mod::before {
  content:'';
  position:absolute;
  top:0; left:0; right:0; bottom:0;
  border-radius:14px;
  padding:1.5px;
  background:linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.02) 50%, rgba(255,255,255,0.08) 100%);
  -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  pointer-events:none;
  opacity:0.6;
  transition:opacity 0.4s;
}
.mod::after {
  content:'';
  position:absolute;
  top:-50%; left:-50%; width:200%; height:200%;
  background:radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(255,255,255,0.08) 0%, transparent 60%);
  pointer-events:none;
  opacity:0;
  transition:opacity 0.4s;
}
.mod:hover::after { opacity:1; }
.mod:hover::before { opacity:1; }
.mod:hover {
  border-color:rgba(255,255,255,0.18);
  background:linear-gradient(145deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.02) 100%);
  transform:translate(-50%,-50%) perspective(800px) rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg)) scale(1.06);
  box-shadow:
    0 8px 40px rgba(0,0,0,0.5),
    0 0 60px var(--glow, rgba(124,110,245,0.15)),
    inset 0 1px 0 rgba(255,255,255,0.1),
    inset 0 -1px 0 rgba(0,0,0,0.3);
}
.mod.active {
  background:linear-gradient(145deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.03) 100%);
  border-color:var(--col, rgba(124,110,245,0.5));
  box-shadow:
    0 0 80px var(--glow, rgba(124,110,245,0.25)),
    0 0 120px var(--glow2, rgba(124,110,245,0.08)),
    inset 0 1px 0 rgba(255,255,255,0.15),
    inset 0 -1px 0 rgba(0,0,0,0.2);
  animation:modPulse 2.5s ease-in-out infinite;
}
@keyframes modPulse {
  0%, 100% { box-shadow:0 0 80px var(--glow, rgba(124,110,245,0.25)), 0 0 120px var(--glow2, rgba(124,110,245,0.08)), inset 0 1px 0 rgba(255,255,255,0.15); }
  50% { box-shadow:0 0 100px var(--glow, rgba(124,110,245,0.35)), 0 0 160px var(--glow2, rgba(124,110,245,0.12)), inset 0 1px 0 rgba(255,255,255,0.2); }
}

.mod-header { display:flex; align-items:center; gap:10px; position:relative; z-index:2; }
.mod-icon {
  width:32px; height:32px;
  border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-family:'Orbitron', sans-serif;
  font-size:11px; font-weight:700;
  color:rgba(255,255,255,0.9);
  background:linear-gradient(135deg, var(--col, #7C6EF5) 0%, var(--col2, #5a4fd4) 100%);
  box-shadow:0 2px 12px var(--glow, rgba(124,110,245,0.4));
  position:relative;
  overflow:hidden;
}
.mod-icon::after {
  content:'';
  position:absolute; top:0; left:0; right:0; bottom:0;
  background:linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%);
}
.mod-name {
  font-family:'Orbitron', sans-serif;
  font-size:11px; font-weight:600; letter-spacing:.12em;
  color:rgba(255,255,255,0.92); text-transform:uppercase;
}
.mod-sub {
  font-family:'Rajdhani', sans-serif;
  font-size:12px; font-weight:500; color:rgba(255,255,255,0.35);
  margin-top:6px; letter-spacing:.06em; padding-left:42px;
}
.mod-bar-wrap {
  margin-top:14px;
  height:3px;
  border-radius:2px;
  background:rgba(255,255,255,0.05);
  overflow:hidden;
  position:relative;
}
.mod-bar {
  height:100%; border-radius:2px; width:0%;
  transition:width 0.6s cubic-bezier(0.23, 1, 0.32, 1);
  background:linear-gradient(90deg, var(--col, #7C6EF5) 0%, var(--col2, #9b8fff) 100%);
  box-shadow:0 0 8px var(--glow, rgba(124,110,245,0.5));
  position:relative;
}
.mod-bar::after {
  content:'';
  position:absolute; top:0; right:0; width:20px; height:100%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.4));
  animation:barShimmer 1.5s ease-in-out infinite;
}
@keyframes barShimmer {
  0% { transform:translateX(-20px); opacity:0; }
  50% { opacity:1; }
  100% { transform:translateX(20px); opacity:0; }
}
.mod-stats {
  display:flex; gap:12px; margin-top:10px; padding-left:42px;
  opacity:0; transform:translateY(4px);
  transition:all 0.35s ease;
}
.mod:hover .mod-stats, .mod.active .mod-stats { opacity:1; transform:translateY(0); }
.mod-stat {
  font-family:'JetBrains Mono', monospace;
  font-size:9px; color:rgba(255,255,255,0.25);
  letter-spacing:.04em;
}
.mod-stat span { color:var(--col, rgba(255,255,255,0.5)); font-weight:500; }

/* === STATUS BAR === */
#statusbar {
  position:absolute; bottom:28px; left:50%; transform:translateX(-50%);
  font-family:'Orbitron', sans-serif;
  font-size:10px; font-weight:500; letter-spacing:.2em;
  color:rgba(255,255,255,0.18); text-transform:uppercase;
  pointer-events:none; text-align:center; white-space:nowrap;
  display:flex; align-items:center; gap:16px;
}
#statusbar .sep {
  width:4px; height:4px; border-radius:50%;
  background:rgba(255,255,255,0.12);
}
#statusbar .pulse-dot {
  width:6px; height:6px; border-radius:50%;
  background:#1D9E75;
  box-shadow:0 0 8px #1D9E75, 0 0 16px #1D9E75;
  animation:statusPulse 2s ease-in-out infinite;
}
@keyframes statusPulse {
  0%, 100% { opacity:0.6; transform:scale(1); }
  50% { opacity:1; transform:scale(1.3); }
}

/* === CORE LABEL === */
#corelabel {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  font-family:'Orbitron', sans-serif;
  font-size:13px; font-weight:700; letter-spacing:.35em;
  color:rgba(255,255,255,0.08); text-transform:uppercase;
  pointer-events:none; text-align:center; line-height:2.2;
  margin-top:100px;
  text-shadow:0 0 40px rgba(124,110,245,0.1);
}
#corelabel span {
  font-size:9px; letter-spacing:.4em;
  color:rgba(255,255,255,0.04);
  font-weight:500;
}

/* === TOP HUD BAR === */
#hud-top {
  position:absolute; top:0; left:0; right:0;
  height:48px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 32px;
  pointer-events:none;
  z-index:20;
}
.hud-left, .hud-right {
  display:flex; align-items:center; gap:20px;
}
.hud-item {
  font-family:'JetBrains Mono', monospace;
  font-size:9px; letter-spacing:.1em;
  color:rgba(255,255,255,0.2);
  text-transform:uppercase;
}
.hud-item span { color:rgba(255,255,255,0.45); }
.hud-line {
  width:120px; height:1px;
  background:linear-gradient(90deg, transparent, rgba(124,110,245,0.3), transparent);
}

/* === CORNER DECORATIONS === */
.corner {
  position:absolute; width:60px; height:60px;
  pointer-events:none; z-index:20;
}
.corner-tl { top:20px; left:20px; border-top:1px solid rgba(124,110,245,0.2); border-left:1px solid rgba(124,110,245,0.2); }
.corner-tr { top:20px; right:20px; border-top:1px solid rgba(124,110,245,0.2); border-right:1px solid rgba(124,110,245,0.2); }
.corner-bl { bottom:20px; left:20px; border-bottom:1px solid rgba(124,110,245,0.2); border-left:1px solid rgba(124,110,245,0.2); }
.corner-br { bottom:20px; right:20px; border-bottom:1px solid rgba(124,110,245,0.2); border-right:1px solid rgba(124,110,245,0.2); }

/* === SCANLINE OVERLAY === */
#scanlines {
  position:absolute; top:0; left:0; width:100%; height:100%;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events:none; z-index:100;
  opacity:0.5;
}

/* === VIGNETTE === */
#vignette {
  position:absolute; top:0; left:0; width:100%; height:100%;
  background:radial-gradient(ellipse at center, transparent 40%, rgba(5,3,10,0.6) 100%);
  pointer-events:none; z-index:90;
}

/* === CHAT PANEL — aynı dil, modüllerle uyumlu === */
#chat-panel {
  position:absolute;
  right:32px; top:68px; bottom:68px;
  width:270px;
  display:flex; flex-direction:column;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.08);
  background:linear-gradient(145deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
  backdrop-filter:blur(20px) saturate(1.4);
  -webkit-backdrop-filter:blur(20px) saturate(1.4);
  box-shadow:0 4px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
  z-index:50;
  overflow:hidden;
}
#chat-panel::before {
  content:'';
  position:absolute; top:0; left:0; right:0; bottom:0;
  border-radius:14px; padding:1px;
  background:linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.02) 50%, rgba(255,255,255,0.06) 100%);
  -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor; mask-composite:exclude;
  pointer-events:none; opacity:0.5;
}
#chat-header {
  padding:11px 15px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  display:flex; align-items:center; gap:8px;
  flex-shrink:0;
}
#chat-header-dot {
  width:7px; height:7px; border-radius:50%;
  background:rgba(255,255,255,0.25);
  animation:statusPulse 3s ease-in-out infinite;
}
#chat-header-title {
  font-family:'Orbitron', sans-serif;
  font-size:9px; font-weight:600; letter-spacing:.2em;
  color:rgba(255,255,255,0.35); text-transform:uppercase;
}
#chat-header-model {
  margin-left:auto;
  font-family:'JetBrains Mono', monospace;
  font-size:8px; color:rgba(255,255,255,0.15);
  letter-spacing:.06em;
}
#chat-messages {
  flex:1; overflow-y:auto; padding:13px;
  display:flex; flex-direction:column; gap:10px;
  scrollbar-width:thin;
  scrollbar-color:rgba(255,255,255,0.08) transparent;
}
#chat-messages::-webkit-scrollbar { width:2px; }
#chat-messages::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:2px; }
.msg { display:flex; flex-direction:column; gap:3px; animation:msgIn 0.25s ease-out; }
@keyframes msgIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.msg-label {
  font-family:'JetBrains Mono', monospace;
  font-size:8px; letter-spacing:.1em; text-transform:uppercase;
  color:rgba(255,255,255,0.18);
}
.msg.user .msg-label { text-align:right; }
.msg-bubble {
  padding:9px 12px; border-radius:9px;
  font-family:'Rajdhani', sans-serif;
  font-size:12.5px; font-weight:400; line-height:1.55;
  color:rgba(255,255,255,0.7);
  word-break:break-word;
}
.msg.user .msg-bubble {
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-bottom-right-radius:3px;
  align-self:flex-end;
}
.msg.theia .msg-bubble {
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);
  border-bottom-left-radius:3px;
  align-self:flex-start;
}
.typing-dots span {
  display:inline-block; width:4px; height:4px; border-radius:50%;
  background:rgba(255,255,255,0.3); margin:0 2px;
  animation:typingBounce 1.2s ease-in-out infinite;
}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes typingBounce {
  0%,60%,100%{transform:translateY(0);opacity:.3}
  30%{transform:translateY(-4px);opacity:.8}
}
#chat-input-area {
  padding:10px 12px;
  border-top:1px solid rgba(255,255,255,0.05);
  display:flex; gap:7px; align-items:flex-end;
  flex-shrink:0;
}
#chat-input {
  flex:1;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:9px;
  padding:8px 11px;
  font-family:'Rajdhani', sans-serif;
  font-size:12.5px; color:rgba(255,255,255,0.75);
  resize:none; outline:none;
  max-height:90px; min-height:34px;
  line-height:1.4; scrollbar-width:none;
  transition:border-color 0.2s;
}
#chat-input::placeholder { color:rgba(255,255,255,0.18); }
#chat-input:focus { border-color:rgba(255,255,255,0.15); }
#chat-send {
  width:32px; height:32px; border-radius:8px; flex-shrink:0;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.2s;
}
#chat-send:hover { background:rgba(255,255,255,0.1); border-color:rgba(255,255,255,0.2); }
#chat-send:active { transform:scale(0.95); }
#chat-send svg { width:13px; height:13px; fill:none; stroke:rgba(255,255,255,0.5); stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
</style>
</head>
<body>

<canvas id="bg"></canvas>
<canvas id="c"></canvas>
<canvas id="fx"></canvas>
<div id="scanlines"></div>
<div id="vignette"></div>

<!-- Corner decorations -->
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<!-- Top HUD -->
<div id="hud-top">
  <div class="hud-left">
    <div class="hud-item">SYS <span>ONLINE</span></div>
    <div class="hud-line"></div>
    <div class="hud-item">LAT <span>41.0082°N</span></div>
  </div>
  <div class="hud-right">
    <div class="hud-item">UPTIME <span id="uptime">00:00:00</span></div>
    <div class="hud-line"></div>
    <div class="hud-item">SEC <span>CLASS-A</span></div>
  </div>
</div>

<div id="overlay"></div>

<!-- Chat Panel -->
<div id="chat-panel">
  <div id="chat-header">
    <div id="chat-header-dot"></div>
    <div id="chat-header-title">Theia</div>
    <div id="chat-header-model">localhost:8585</div>
  </div>
  <div id="chat-messages">
    <div class="msg theia">
      <div class="msg-label">THEIA</div>
      <div class="msg-bubble">Sistem aktif. Sizi dinliyorum, Kaptan.</div>
    </div>
  </div>
  <div id="chat-input-area">
    <textarea id="chat-input" rows="1" placeholder="Theia'ya yaz..."></textarea>
    <button id="chat-send">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<div id="statusbar">
  <div class="pulse-dot"></div>
  AMBIENT — DİNLEME MODU
  <div class="sep"></div>
  <span id="clock">00:00:00</span>
</div>

<div id="corelabel">
  THEIA<br>
  <span>VAULT CORE</span>
</div>

<script>
const bg = document.getElementById('bg');
const bc = bg.getContext('2d');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const fxCanvas = document.getElementById('fx');
const fxCtx = fxCanvas.getContext('2d');

let W, H, cx, cy, R, t = 0, activeModule = null;
let particles = [], returnParticles = [];
let ambientT = 0;
let mouseX = 0, mouseY = 0;

const MODS = [
  { id:'vault',    name:'VAULT',       sub:'Memory store',    col:'#7C6EF5', col2:'#9b8fff', angle:210, icon:'V', stats:'8.2TB / 12TB' },
  { id:'guard',    name:'GATEKEEPER',  sub:'Risk classifier', col:'#E85D24', col2:'#ff8a5c', angle:150, icon:'G', stats:'Threat: LOW' },
  { id:'intent',   name:'INTENT',      sub:'NL engine',       col:'#1D9E75', col2:'#4dd4a0', angle: 90, icon:'I', stats:'Latency: 42ms' },
  { id:'ritual',   name:'RITUALS',     sub:'Streak tracker',  col:'#EF9F27', col2:'#ffd166', angle: 30, icon:'R', stats:'Day 47 / 365' },
  { id:'audit',    name:'AUDIT LOG',   sub:'Every action',    col:'#5DCAA5', col2:'#8effd4', angle:330, icon:'A', stats:'1,247 events' },
  { id:'telegram', name:'TELEGRAM',    sub:'Mobile approve',  col:'#4FA8D5', col2:'#7dd3fc', angle:270, icon:'T', stats:'Bot: Online' },
];

let nodes = [], synapses = [];
let stars = [];
let shockwaves = [];

function hex2rgb(h) {
  return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
}

function resize() {
  W = canvas.width = bg.width = fxCanvas.width = window.innerWidth;
  H = canvas.height = bg.height = fxCanvas.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
  R = Math.min(W, H) * 0.17;
  drawBg();
  layoutMods();
  buildNodes();
  buildSynapses();
  buildStars();
}

/* ========== BACKGROUND ========== */
function drawBg() {
  bc.clearRect(0, 0, W, H);

  // Deep space gradient
  const g = bc.createRadialGradient(cx, cy * 0.6, 0, cx, cy, Math.max(W, H));
  g.addColorStop(0, '#120a25');
  g.addColorStop(0.3, '#0a0618');
  g.addColorStop(0.6, '#060310');
  g.addColorStop(1, '#020105');
  bc.fillStyle = g;
  bc.fillRect(0, 0, W, H);

  // Nebula clouds
  const nebulaColors = [
    { x: cx * 0.3, y: cy * 0.4, r: Math.max(W,H)*0.4, col: 'rgba(124,110,245,0.03)' },
    { x: cx * 1.6, y: cy * 0.7, r: Math.max(W,H)*0.35, col: 'rgba(93,202,165,0.02)' },
    { x: cx * 0.8, y: cy * 1.3, r: Math.max(W,H)*0.3, col: 'rgba(232,93,36,0.015)' },
  ];
  nebulaColors.forEach(n => {
    const ng = bc.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
    ng.addColorStop(0, n.col);
    ng.addColorStop(1, 'transparent');
    bc.fillStyle = ng;
    bc.fillRect(0, 0, W, H);
  });

  // Perspective grid floor
  const vx = cx, vy = cy * 0.42;
  bc.strokeStyle = 'rgba(124,110,245,0.04)';
  bc.lineWidth = 0.5;
  for (let i = 0; i < 24; i++) {
    const y = vy + (H - vy) * (i / 23);
    const spread = (y - vy) / (H - vy);
    const x0 = cx - W * 0.8 * spread;
    const x1 = cx + W * 0.8 * spread;
    bc.beginPath(); bc.moveTo(x0, y); bc.lineTo(x1, y); bc.stroke();
  }
  for (let i = -10; i <= 10; i++) {
    const tx = cx + i * (W / 14);
    bc.beginPath(); bc.moveTo(vx, vy); bc.lineTo(tx, H); bc.stroke();
  }

  // Horizon glow
  const hg = bc.createLinearGradient(0, vy - 40, 0, vy + 100);
  hg.addColorStop(0, 'rgba(124,110,245,0)');
  hg.addColorStop(0.5, 'rgba(124,110,245,0.05)');
  hg.addColorStop(1, 'rgba(124,110,245,0)');
  bc.fillStyle = hg;
  bc.fillRect(0, vy - 40, W, 140);
}

/* ========== STARS ========== */
function buildStars() {
  stars = [];
  for (let i = 0; i < 200; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H * 0.6,
      size: Math.random() * 1.5 + 0.3,
      twinkle: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.02 + 0.005,
      depth: Math.random(),
    });
  }
}

function drawStars() {
  stars.forEach(s => {
    s.twinkle += s.speed;
    const alpha = (Math.sin(s.twinkle) + 1) * 0.5 * (0.3 + s.depth * 0.5);
    const size = s.size * (0.5 + s.depth * 0.5);
    ctx.beginPath(); ctx.arc(s.x, s.y, size, 0, Math.PI*2);
    ctx.fillStyle = `rgba(220,210,255,${alpha})`; ctx.fill();

    // Cross sparkle for bright stars
    if (s.depth > 0.8 && Math.sin(s.twinkle) > 0.7) {
      ctx.strokeStyle = `rgba(220,210,255,${alpha * 0.3})`;
      ctx.lineWidth = 0.3;
      ctx.beginPath(); ctx.moveTo(s.x - size*3, s.y); ctx.lineTo(s.x + size*3, s.y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(s.x, s.y - size*3); ctx.lineTo(s.x, s.y + size*3); ctx.stroke();
    }
  });
}

/* ========== MODULES ========== */
function layoutMods() {
  const orb = Math.min(W, H) * 0.38;
  MODS.forEach(m => {
    const rad = (m.angle - 90) * Math.PI / 180;
    m.bx = cx + orb * Math.cos(rad);
    m.by = cy + orb * Math.sin(rad);
    let el = document.getElementById('m-' + m.id);
    if (!el) {
      el = document.createElement('div');
      el.className = 'mod';
      el.id = 'm-' + m.id;
      el.innerHTML = `
        <div class="mod-header">
          <div class="mod-icon">${m.icon}</div>
          <div class="mod-name">${m.name}</div>
        </div>
        <div class="mod-sub">${m.sub}</div>
        <div class="mod-bar-wrap"><div class="mod-bar" id="bar-${m.id}"></div></div>
        <div class="mod-stats"><div class="mod-stat"><span>${m.stats}</span></div></div>
      `;
      el.style.setProperty('--col', m.col);
      el.style.setProperty('--col2', m.col2);
      el.style.setProperty('--glow', m.col + '33');
      el.style.setProperty('--glow2', m.col + '15');
      el.addEventListener('click', () => activateMod(m));
      el.addEventListener('mousemove', (e) => {
        const rect = el.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width * 100;
        const y = (e.clientY - rect.top) / rect.height * 100;
        el.style.setProperty('--mx', x + '%');
        el.style.setProperty('--my', y + '%');
        const rx = (y - 50) * -0.3;
        const ry = (x - 50) * 0.3;
        el.style.setProperty('--rx', rx + 'deg');
        el.style.setProperty('--ry', ry + 'deg');
      });
      el.addEventListener('mouseleave', () => {
        el.style.setProperty('--rx', '0deg');
        el.style.setProperty('--ry', '0deg');
      });
      document.getElementById('overlay').appendChild(el);
    }
    el.style.left = m.bx + 'px';
    el.style.top  = m.by + 'px';
  });
}

/* ========== NODES & SYNAPSES ========== */
function buildNodes() {
  nodes = [];
  for (let i = 0; i < 160; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    const r     = R * (0.2 + Math.random() * 0.8);
    const z     = r * Math.cos(phi);
    nodes.push({
      x: cx + r * Math.sin(phi) * Math.cos(theta),
      y: cy + r * Math.sin(phi) * Math.sin(theta),
      z,
      vx: (Math.random() - .5) * 0.05,
      vy: (Math.random() - .5) * 0.05,
      r: 1 + Math.random() * 1.8,
      pulse: Math.random() * Math.PI * 2,
      fire: 0, fireCol: null,
      col: Math.random() > .5 ? [124,110,245] : [93,202,165],
    });
  }
}

function buildSynapses() {
  synapses = [];
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const dx = nodes[i].x - nodes[j].x;
      const dy = nodes[i].y - nodes[j].y;
      const d  = Math.sqrt(dx*dx + dy*dy);
      if (d < R * 0.48 && Math.random() > .45) {
        synapses.push({ a: i, b: j, d });
      }
    }
  }
}

/* ========== SHOCKWAVE ========== */
function addShockwave(x, y, col) {
  shockwaves.push({ x, y, r: 0, maxR: R * 2.5, alpha: 1, col, speed: 3 });
}

function drawShockwaves() {
  shockwaves = shockwaves.filter(sw => {
    sw.r += sw.speed;
    sw.alpha = Math.max(0, 1 - sw.r / sw.maxR);
    if (sw.alpha <= 0) return false;
    const [r,g,b] = hex2rgb(sw.col);
    ctx.beginPath(); ctx.arc(sw.x, sw.y, sw.r, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(${r},${g},${b},${sw.alpha * 0.3})`;
    ctx.lineWidth = 2; ctx.stroke();
    ctx.beginPath(); ctx.arc(sw.x, sw.y, sw.r * 0.7, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(${r},${g},${b},${sw.alpha * 0.15})`;
    ctx.lineWidth = 1; ctx.stroke();
    return true;
  });
}

/* ========== ACTIVATION ========== */
function activateMod(m) {
  activeModule = m;
  document.querySelectorAll('.mod').forEach(e => {
    e.classList.remove('active');
  });
  const el = document.getElementById('m-' + m.id);
  el.classList.add('active');

  const bar = document.getElementById('bar-' + m.id);
  bar.style.width = '100%';
  setTimeout(() => bar.style.width = '0%', 3000);

  document.getElementById('statusbar').innerHTML = `
    <div class="pulse-dot" style="background:${m.col};box-shadow:0 0 8px ${m.col},0 0 16px ${m.col}"></div>
    ${m.name} — VERİ AKIŞI
    <div class="sep" style="background:${m.col}44"></div>
    <span style="color:${m.col}88">${m.stats}</span>
  `;

  // Shockwave
  addShockwave(cx, cy, m.col);

  // inbound particles
  for (let k = 0; k < 18; k++) {
    const tn = nodes[Math.floor(Math.random() * nodes.length)];
    particles.push({
      x: m.bx, y: m.by,
      tx: tn.x, ty: tn.y,
      prog: 0, speed: .016 + Math.random() * .012,
      col: m.col, node: tn, size: 3.2, delay: k * 45
    });
  }

  // outbound particles
  setTimeout(() => {
    for (let k = 0; k < 12; k++) {
      const sn = nodes[Math.floor(Math.random() * nodes.length)];
      returnParticles.push({
        x: sn.x, y: sn.y,
        tx: m.bx, ty: m.by,
        prog: 0, speed: .014 + Math.random() * .01,
        col: m.col, size: 2.2
      });
    }
  }, 500);

  nodes.forEach(n => {
    if (Math.random() > .25) { n.fire = .9 + Math.random() * .1; n.fireCol = m.col; }
  });

  setTimeout(() => {
    if (activeModule === m) {
      activeModule = null;
      document.getElementById('statusbar').innerHTML = `
        <div class="pulse-dot"></div>
        AMBIENT — DİNLEME MODU
        <div class="sep"></div>
        <span id="clock">${new Date().toLocaleTimeString('tr-TR')}</span>
      `;
      document.querySelectorAll('.mod').forEach(e => e.classList.remove('active'));
    }
  }, 3500);
}

function ambientFlow() {
  ambientT++;
  if (ambientT % 160 === 0) {
    const m   = MODS[Math.floor(Math.random() * MODS.length)];
    const tn  = nodes[Math.floor(Math.random() * nodes.length)];
    particles.push({
      x: m.bx, y: m.by, tx: tn.x, ty: tn.y,
      prog: 0, speed: .008, col: m.col, node: tn, size: 2, delay: 0, ambient: true
    });
    setTimeout(() => {
      const sn = nodes[Math.floor(Math.random() * nodes.length)];
      returnParticles.push({
        x: sn.x, y: sn.y, tx: m.bx, ty: m.by,
        prog: 0, speed: .008, col: m.col, size: 1.6, ambient: true
      });
    }, 800);
  }
}

/* ========== MAIN DRAW ========== */
function draw() {
  t += .008;
  ctx.clearRect(0, 0, W, H);
  fxCtx.clearRect(0, 0, W, H);
  ambientFlow();

  drawStars();

  // Orbit rings
  const orb = Math.min(W, H) * 0.38;

  // Outer ring with ticks
  ctx.beginPath(); ctx.arc(cx, cy, orb, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.02)'; ctx.lineWidth = 0.5; ctx.stroke();

  // Tick marks on outer ring
  for (let i = 0; i < 60; i++) {
    const a = (i / 60) * Math.PI * 2;
    const len = i % 5 === 0 ? 8 : 4;
    const x1 = cx + (orb - len) * Math.cos(a);
    const y1 = cy + (orb - len) * Math.sin(a);
    const x2 = cx + orb * Math.cos(a);
    const y2 = cy + orb * Math.sin(a);
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
    ctx.strokeStyle = i % 5 === 0 ? 'rgba(124,110,245,0.15)' : 'rgba(124,110,245,0.06)';
    ctx.lineWidth = i % 5 === 0 ? 1 : 0.5; ctx.stroke();
  }

  // Inner decorative rings
  ctx.beginPath(); ctx.arc(cx, cy, R * 1.25, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(140,110,240,0.05)'; ctx.lineWidth = 0.8; ctx.stroke();

  ctx.beginPath(); ctx.arc(cx, cy, R * 0.85, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(140,110,240,0.03)'; ctx.lineWidth = 0.5; ctx.stroke();

  // Rotating ring segment
  const segStart = t * 0.5;
  const segEnd = segStart + Math.PI * 0.3;
  ctx.beginPath(); ctx.arc(cx, cy, R * 1.25, segStart, segEnd);
  ctx.strokeStyle = 'rgba(124,110,245,0.1)'; ctx.lineWidth = 2; ctx.stroke();

  // Dashed lines module → center
  MODS.forEach(m => {
    const isActive = activeModule === m;
    const [r, g, b] = hex2rgb(m.col);
    ctx.beginPath(); ctx.moveTo(m.bx, m.by); ctx.lineTo(cx, cy);
    ctx.strokeStyle = isActive ? `rgba(${r},${g},${b},0.2)` : `rgba(${r},${g},${b},0.04)`;
    ctx.lineWidth = isActive ? 1.2 : 0.4;
    ctx.setLineDash([6, 10]); ctx.stroke(); ctx.setLineDash([]);

    // Data packets on lines
    if (isActive && Math.random() > 0.7) {
      const prog = Math.random();
      const px = m.bx + (cx - m.bx) * prog;
      const py = m.by + (cy - m.by) * prog;
      ctx.beginPath(); ctx.arc(px, py, 2, 0, Math.PI*2);
      ctx.fillStyle = m.col; ctx.fill();
    }
  });

  // Move & constrain nodes
  nodes.forEach(n => {
    n.x += n.vx; n.y += n.vy;
    const dx = n.x - cx, dy = n.y - cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > R * 1.05) {
      n.vx *= -.8; n.vy *= -.8;
      n.x = cx + dx / dist * R * .98;
      n.y = cy + dy / dist * R * .98;
    }
    if (dist < R * .18) { n.vx += dx * .003; n.vy += dy * .003; }
    n.pulse += .016;
    if (n.fire > 0) n.fire -= .012;
    if (n.fire < 0) n.fire = 0;
  });

  // Synapses with data flow
  synapses.forEach((s, idx) => {
    const a = nodes[s.a], b = nodes[s.b];
    const avgZ = (a.z + b.z) / (R * 2) + .5;
    let alpha = avgZ * .1 + .02;
    const fire = Math.max(a.fire, b.fire);
    if (fire > 0) alpha = Math.min(.7, alpha + fire * .55);
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
    if (fire > 0 && a.fireCol) {
      const [r,g,bb] = hex2rgb(a.fireCol);
      ctx.strokeStyle = `rgba(${r},${g},${bb},${alpha})`;
    } else {
      const [r,g,bb] = a.col;
      ctx.strokeStyle = `rgba(${r},${g},${bb},${alpha})`;
    }
    ctx.lineWidth = .6; ctx.stroke();

    // Occasional data packet on synapse
    if (Math.random() > 0.995) {
      const prog = Math.random();
      const px = a.x + (b.x - a.x) * prog;
      const py = a.y + (b.y - a.y) * prog;
      ctx.beginPath(); ctx.arc(px, py, 1.2, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.fill();
    }
  });

  // Ambient random neuron fire
  if (Math.random() < .025) {
    const n = nodes[Math.floor(Math.random() * nodes.length)];
    n.fire = .6 + Math.random() * .3; n.fireCol = null;
  }

  // Nodes with 3D depth
  // Sort by z for proper depth
  const sortedNodes = [...nodes].sort((a, b) => a.z - b.z);
  sortedNodes.forEach(n => {
    const depth = (n.z / R + 1) * .5;
    const pulse = (Math.sin(n.pulse) + 1) * .5;
    let alpha = depth * .6 + .1 + pulse * .15;
    let size  = n.r * (.5 + depth * 1.2);
    if (n.fire > 0) { alpha = Math.min(1, alpha + n.fire); size *= (1 + n.fire * 1.6); }

    // Glow for front nodes
    if (depth > 0.6) {
      ctx.beginPath(); ctx.arc(n.x, n.y, size * 3, 0, Math.PI*2);
      const [r,g,bb] = n.fireCol && n.fire > 0 ? hex2rgb(n.fireCol) : n.col;
      ctx.fillStyle = `rgba(${r},${g},${bb},${alpha * 0.08})`; ctx.fill();
    }

    // Shadow
    if (depth > .5) {
      ctx.beginPath(); ctx.arc(n.x + 2, n.y + 2, size * .7, 0, Math.PI*2);
      ctx.fillStyle = `rgba(0,0,0,${depth * .2})`; ctx.fill();
    }

    // Core
    const [r,g,bb] = n.fireCol && n.fire > 0 ? hex2rgb(n.fireCol) : n.col;
    ctx.beginPath(); ctx.arc(n.x, n.y, size, 0, Math.PI*2);
    ctx.fillStyle = `rgba(${r},${g},${bb},${alpha})`; ctx.fill();

    // Highlight
    if (size > 1.5) {
      ctx.beginPath(); ctx.arc(n.x - size*0.3, n.y - size*0.3, size*0.3, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${alpha * 0.4})`; ctx.fill();
    }
  });

  // Sphere glow (enhanced 3D)
  for (let i = 4; i >= 1; i--) {
    const ox = cx - R * .1, oy = cy - R * .15;
    const gr = ctx.createRadialGradient(ox, oy, R * .04 * i, cx, cy, R * (.5 + i * .18));
    const pulse = Math.sin(t * .55 + i * 0.8) * .02 + .035;
    gr.addColorStop(0, `rgba(180,160,255,${pulse * 2.5 / i})`);
    gr.addColorStop(.4, `rgba(140,110,240,${pulse * 1.2 / i})`);
    gr.addColorStop(.8, `rgba(100,70,200,${pulse * 0.4 / i})`);
    gr.addColorStop(1, 'rgba(80,60,180,0)');
    ctx.beginPath(); ctx.arc(cx, cy, R * (.5 + i * .18), 0, Math.PI*2);
    ctx.fillStyle = gr; ctx.fill();
  }

  // Specular highlight (glass effect)
  const spec = ctx.createRadialGradient(cx - R * .35, cy - R * .4, 0, cx - R * .35, cy - R * .4, R * .55);
  spec.addColorStop(0, `rgba(240,230,255,${.1 + Math.sin(t * .4) * .025})`);
  spec.addColorStop(.5, `rgba(200,180,255,${.04 + Math.sin(t * .4) * .01})`);
  spec.addColorStop(1, 'rgba(180,160,255,0)');
  ctx.beginPath(); ctx.arc(cx, cy, R * 1.05, 0, Math.PI*2);
  ctx.fillStyle = spec; ctx.fill();

  // Inner core ring
  ctx.beginPath(); ctx.arc(cx, cy, R * 0.3, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(180,160,255,${0.08 + Math.sin(t) * 0.03})`;
  ctx.lineWidth = 1.5; ctx.stroke();

  // Inbound particles with trails
  particles = particles.filter(p => {
    if (p.delay > 0) { p.delay--; return true; }
    p.prog = Math.min(1, p.prog + p.speed);
    const px = p.x + (p.tx - p.x) * p.prog;
    const py = p.y + (p.ty - p.y) * p.prog;
    const alpha = Math.sin(p.prog * Math.PI) * (p.ambient ? .6 : 1);
    const [r,g,b] = hex2rgb(p.col.slice(0,7));

    // Trail
    for (let ti = 1; ti <= 4; ti++) {
      const tp = Math.max(0, p.prog - ti * 0.03);
      const tx = p.x + (p.tx - p.x) * tp;
      const ty = p.y + (p.ty - p.y) * tp;
      ctx.beginPath(); ctx.arc(tx, ty, p.size * (1 - ti * 0.15) * (1 - tp * 0.2), 0, Math.PI*2);
      ctx.fillStyle = `rgba(${r},${g},${b},${alpha * (0.6 - ti * 0.12)})`; ctx.fill();
    }

    // Head
    ctx.beginPath(); ctx.arc(px, py, p.size * (1 - p.prog * 0.2), 0, Math.PI*2);
    ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`; ctx.fill();

    // Glow
    ctx.beginPath(); ctx.arc(px, py, p.size * 3, 0, Math.PI*2);
    ctx.fillStyle = `rgba(${r},${g},${b},${alpha * 0.15})`; ctx.fill();

    if (p.prog >= 1 && p.node) { p.node.fire = 1; p.node.fireCol = p.col.slice(0,7); }
    return p.prog < 1;
  });

  // Outbound particles
  returnParticles = returnParticles.filter(p => {
    p.prog = Math.min(1, p.prog + p.speed);
    const px = p.x + (p.tx - p.x) * p.prog;
    const py = p.y + (p.ty - p.y) * p.prog;
    const alpha = Math.sin(p.prog * Math.PI) * (p.ambient ? .5 : .85);
    const [r,g,b] = hex2rgb(p.col.slice(0,7));

    for (let ti = 1; ti <= 3; ti++) {
      const tp = Math.max(0, p.prog - ti * 0.025);
      const tx = p.x + (p.tx - p.x) * tp;
      const ty = p.y + (p.ty - p.y) * tp;
      ctx.beginPath(); ctx.arc(tx, ty, p.size * (1 - ti * 0.1) * (1 - tp * 0.15), 0, Math.PI*2);
      ctx.fillStyle = `rgba(${r},${g},${b},${alpha * (0.5 - ti * 0.1)})`; ctx.fill();
    }

    ctx.beginPath(); ctx.arc(px, py, p.size * (1 - p.prog * 0.15), 0, Math.PI*2);
    ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`; ctx.fill();
    return p.prog < 1;
  });

  // Shockwaves
  drawShockwaves();

  requestAnimationFrame(draw);
}

/* ========== CLOCK & UPTIME ========== */
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('tr-TR');
}
setInterval(updateClock, 1000);
updateClock();

let uptimeSec = 0;
function updateUptime() {
  uptimeSec++;
  const h = String(Math.floor(uptimeSec / 3600)).padStart(2, '0');
  const m = String(Math.floor((uptimeSec % 3600) / 60)).padStart(2, '0');
  const s = String(uptimeSec % 60).padStart(2, '0');
  document.getElementById('uptime').textContent = `${h}:${m}:${s}`;
}
setInterval(updateUptime, 1000);

/* ========== MOUSE TRACKING ========== */
document.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

window.addEventListener('resize', resize);
resize();
draw();
</script>

const chatMessages = document.getElementById('chat-messages');
const chatInput    = document.getElementById('chat-input');

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'user' ? 'user' : 'theia');

function showTyping() {

  div.className = 'msg theia'; div.id = 'typing-ind';

  chatMessages.appendChild(div);

}
function hideTyping() {

  if (el) el.remove();

function pulseModule(id) {

}

async function sendMessage() {
  const text = chatInput.value.trim();
  if (!text) return;
  chatInput.value = ''; chatInput.style.height = 'auto';
  chatSend.disabled = true;

  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  pulseModule('intent');
  showTyping();

  try {
    const r = await fetch('http://localhost:8585/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history: conversationHistory })
    });
    const data = await r.json();
    hideTyping();

    const reply = data.response || data.message || data.reply || JSON.stringify(data);
    conversationHistory.push({ role: 'assistant', content: reply });
    addMessage('theia', reply);

    // cevap geldikten sonra vault modülü aktive — hafızaya yazıldı hissi
    setTimeout(function(){ pulseModule('vault'); }, 700);

    // header dot aktif renk ile flash
    const dot = document.getElementById('chat-header-dot');
    dot.style.background = '#1D9E75';
    dot.style.boxShadow = '0 0 8px #1D9E75';
    setTimeout(function(){
      dot.style.background = 'rgba(255,255,255,0.25)';
      dot.style.boxShadow = 'none';
    }, 2000);

  } catch(err) {
    hideTyping();
    addMessage('theia', '⚠ ' + err.message + ' — localhost:8585 çalışıyor mu?');
  } finally {
    chatSend.disabled = false;
  }
}

chatSend.addEventListener('click', sendMessage);

  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

});
